name: Codex PR Checks

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: 26

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies (fresh lockfile)
        uses: ./.github/actions/pnpm-install-fresh

      - name: Prepare test environment
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ -n "${DOTENV_PRIVATE_KEY_DEVELOPMENT:-}" ]; then
            echo "USE_DOTENVX=true" >> "$GITHUB_ENV"
          else
            echo "USE_DOTENVX=false" >> "$GITHUB_ENV"
            cp .github/ci.env.development .env.development
            DB_ROOT="${RUNNER_TEMP}/codex-ci-db"
            mkdir -p "$DB_ROOT"
            {
              echo ""
              echo "# CI-only absolute DB paths (core rejects relative SESSION_DB_PATH)"
              echo "SESSION_DB_PATH=${DB_ROOT}/session.test.db"
              echo "ARMORY_DB_PATH=${DB_ROOT}/armory.test.db"
              echo "WARFRAME_DB_PATH=${DB_ROOT}/warframe.test.db"
              echo "EPIC7_DB_PATH=${DB_ROOT}/epic7.test.db"
              echo "WOR_DB_PATH=${DB_ROOT}/wor.test.db"
            } >> .env.development
            echo "::notice title=CI env::No DOTENV_PRIVATE_KEY_DEVELOPMENT (Dependabot/forks). Using .github/ci.env.development plus RUNNER_TEMP DB paths. Optional: add this secret under Settings → Secrets and variables → Actions → Dependabot to use the committed encrypted .env.development instead."
          fi

      - name: Run quality checks
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run validate
          else
            pnpm run validate
          fi

      - name: Build project
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run build
          else
            pnpm run build
          fi

      - name: Test coverage report
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run test:coverage
          else
            pnpm run test:coverage
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7
